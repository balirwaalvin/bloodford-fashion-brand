{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-icon">BF</div>
                <h1>Welcome Back</h1>
                <p>Sign in to your BloodFord Fashion Brand account</p>
            </div>

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <div class="form-check" style="margin-bottom: 0;">
                        <input type="checkbox" name="remember" id="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="#" style="color: var(--red); font-size: 0.9rem;">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg">Sign In</button>
            </form>

            <div style="text-align: center; margin: 24px 0 16px; color: var(--gray-400); font-size: 0.85rem; position: relative;">
                <span style="background: var(--white); padding: 0 16px; position: relative; z-index: 1;">or</span>
                <div style="position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--gray-200);"></div>
            </div>

            <a href="{{ url_for('register') }}" class="btn btn-outline btn-block" style="margin-bottom: 0;">
                <i class="fas fa-user-plus"></i> Create New Account
            </a>

            <div class="auth-footer">
                Don't have an account? <a href="{{ url_for('register') }}">Sign Up</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
